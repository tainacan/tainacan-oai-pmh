name: Test & Lint

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'refactor/**'
      - 'feature/**'
      - 'fix/**'
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '/assets/images/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '/assets/images/**'
  workflow_dispatch:

jobs:
  phpcs-security:
    name: PHPCS (security, blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2, cs2pr
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install dev dependencies
        run: composer install --no-progress --prefer-dist

      # Security-only lint: WordPress.Security + WordPress.DB rules.
      # These must pass — they catch XSS, SQLi, missing nonce, prepared
      # SQL violations, etc. Style/docblock complaints are tracked
      # separately in phpcs-style (advisory).
      - name: Run PHPCS — security & DB rules only
        # --warning-severity=0 drops warnings entirely (e.g. SlowDBQuery
        # on intentionally-suppressed postmeta lookups). Only true errors
        # — XSS, SQLi, missing nonce, unprepared SQL — gate this job.
        # Dropped cs2pr pipe: it returned non-zero on any annotation,
        # racing with phpcs's own exit code and making the gate flaky.
        # The summary report is enough; full annotations come from the
        # style-advisory job.
        run: |
          vendor/bin/phpcs -q --standard=phpcs.xml.dist \
            --sniffs=WordPress.Security.NonceVerification,WordPress.Security.ValidatedSanitizedInput,WordPress.Security.EscapeOutput,WordPress.Security.SafeRedirect,WordPress.Security.PluginMenuSlug,WordPress.DB.PreparedSQL,WordPress.DB.PreparedSQLPlaceholders,WordPress.DB.DirectDatabaseQuery,WordPress.DB.SlowDBQuery,WordPress.WP.GlobalVariablesOverride \
            --warning-severity=0 \
            --report=summary

  phpcs-style:
    name: PHPCS (style, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}

      - name: Install dev dependencies
        run: composer install --no-progress --prefer-dist

      # Full ruleset (docblocks, Yoda, naming, alignment, etc.).
      # Advisory only — surface the count in the job summary but don't
      # fail the build. Tracked for incremental reduction over time.
      - name: Run PHPCS — full ruleset (advisory)
        run: vendor/bin/phpcs --standard=phpcs.xml.dist --report=summary || true

  phpunit:
    name: PHPUnit (PHP ${{ matrix.php }}, WP ${{ matrix.wordpress }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.3' ]
        wordpress: [ 'latest' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2, wp-cli
          extensions: mysqli, xml, mbstring, simplexml, curl
          coverage: none

      - name: Install subversion (required by install-wp-tests.sh)
        run: sudo apt-get update && sudo apt-get install -y subversion

      - name: Install dev dependencies
        run: composer install --no-progress --prefer-dist

      - name: Install WordPress test suite
        # The MySQL service block above pre-creates the wordpress_test
        # database via MYSQL_DATABASE; pass `true` as the 6th arg to
        # install-wp-tests.sh so it skips its own CREATE DATABASE step
        # (which would fail with "database exists").
        run: |
          chmod +x tests/bin/install-wp-tests.sh
          tests/bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wordpress }} true

      - name: Install Tainacan core into test env
        run: |
          WP_CORE_DIR="${TMPDIR:-/tmp}/wordpress"
          mkdir -p "${WP_CORE_DIR}/wp-content/plugins"
          git clone --depth 1 --branch master https://github.com/tainacan/tainacan.git "${WP_CORE_DIR}/wp-content/plugins/tainacan"
          # Tainacan src/tainacan.php require_once's vendor/autoload.php,
          # which is composer-generated. The clone is sources-only.
          # --ignore-platform-reqs because Tainacan core's composer.lock pins
          # phpoffice/phpspreadsheet + maennchen/zipstream which now require
          # PHP 8.3, but our CI matrix includes 8.1. Those packages aren't
          # in the autoload path of the base classes we need, so ignoring
          # platform reqs is safe here.
          ( cd "${WP_CORE_DIR}/wp-content/plugins/tainacan" && composer install --no-dev --no-progress --prefer-dist --no-interaction --ignore-platform-reqs )

      - name: Run PHPUnit
        run: vendor/bin/phpunit --testsuite unit

  compat:
    name: PHP Compatibility (8.1+)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Install dev dependencies
        run: composer install --no-progress --prefer-dist

      - name: PHP compatibility check
        run: vendor/bin/phpcs --standard=PHPCompatibilityWP --runtime-set testVersion 8.1- --extensions=php --ignore=vendor,node_modules,tests,assets/js/vendor .
